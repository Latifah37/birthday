<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="gallery">

    <h1>📸 Kenangan Kita</h1>

    <img id="slide" src="foto1.jpeg">

    <p>
        Terima kasih sudah menjadi bagian
        dari cerita yang indah ❤️
    </p>

    <br>

    <button
    class="btn"
    onclick="location.href='gift.html'">

        Lanjut ke Hadiah 🎁

    </button>

</div>

<script>

const images=[
"foto1.jpeg",
"foto2.jpeg",
"foto3.jpeg"
];

let current=0;

setInterval(()=>{

current++;

if(current>=images.length){
current=0;
}

document.getElementById("slide").src=
images[current];

},2500);

</script>

</body>
</html>
